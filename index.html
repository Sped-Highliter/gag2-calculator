<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grow a Garden 2 Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
}

.container{
    width:90%;
    max-width:600px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:30px;
    box-shadow:0 0 25px rgba(0,0,0,0.4);
}

h1{
    text-align:center;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    font-weight:bold;
}

input,
select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:white;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:translateY(-2px);
}

#result{
    margin-top:25px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    color:#22c55e;
}
</style>
</head>

<body>

<div class="container">

<h1>🌱 Grow a Garden 2 Calculator</h1>

<label for="crop">Crop</label>
<select id="crop">
    <option value="2">Bamboo</option>
    <option value="22.44">Mushroom</option>
</select>

<label for="kg">Weight (KG)</label>
<input
    type="number"
    id="kg"
    step="0.01"
    placeholder="Enter weight"
>

<label for="mut">Mutation</label>
<select id="mut">
    <option value="1">None (1x)</option>
    <option value="4">Chained (4x)</option>
    <option value="10">Gold (10x)</option>
    <option value="25">Starstruck (25x)</option>
    <option value="30">Rainbow (30x)</option>
    <option value="40">Frozen (40x)</option>
    <option value="70">Electric (70x)</option>
    <option value="80">Bloodlit (80x)</option>
</select>

<button onclick="calc()">Calculate</button>

<div id="result">
Result: 0 shekles
</div>

</div>

<script>

function calc(){

    let base =
        parseFloat(document.getElementById("crop").value);

    let kg =
        parseFloat(document.getElementById("kg").value);

    let mut =
        parseFloat(document.getElementById("mut").value);

    if(isNaN(kg) || kg <= 0){

        document.getElementById("result").innerText =
            "Please enter a valid weight.";

        return;
    }

    let units = kg / 0.01;

    let value = units * base * mut;

    document.getElementById("result").innerText =
        "Result: " +
        Math.ceil(value).toLocaleString() +
        " shekles";
}

</script>

</body>
</html>
